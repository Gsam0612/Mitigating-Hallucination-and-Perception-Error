# ============================================================
# VLA Hallucination Mitigation - Configuration
# ============================================================

project:
  name: "vla-hallucination-mitigation"
  seed: 42
  output_dir: "./results"
  log_dir: "./logs"

# ----- Data -----
data:
  coco_dir: "./data/coco"
  coco_ann_file: "./data/coco/annotations/instances_val2017.json"
  coco_images_dir: "./data/coco/val2017"
  pope_dir: "./data/pope"
  visual_genome_dir: "./data/visual_genome"
  max_train_samples: 500
  max_eval_samples: 200
  train_split: 0.8

# ----- VLM -----
vlm:
  model_name: "llava-hf/llava-1.5-7b-hf"
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  load_in_4bit: true        # QLoRA quantization for efficiency

# ----- Object Detector -----
detector:
  model_name: "yolov8m.pt"  # YOLOv8 Medium
  confidence_threshold: 0.35
  iou_threshold: 0.45
  max_detections: 20

# ----- LoRA -----
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  task_type: "CAUSAL_LM"

# ----- GRPO Training -----
grpo:
  num_candidates: 3           # K candidates per input (3 for speed, 4-5 for quality)
  learning_rate: 2.0e-5       # Slightly higher LR for fewer steps
  num_epochs: 2               # 2 epochs fits within Colab session (~4 hrs on A100)
  batch_size: 2
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  kl_coeff: 0.05             # KL divergence penalty
  clip_range: 0.2            # PPO-style clipping

# ----- Reward Weights -----
rewards:
  correct_object: 1.0
  hallucinated_object: -2.0
  correct_attribute: 0.5
  wrong_attribute: -1.5
  correct_spatial: 0.5
  wrong_spatial: -1.5
  correct_count: 0.5
  wrong_count: -1.0
  verbosity_penalty: -0.1     # per excess sentence
  safety_bonus: 1.0

# ----- Evaluation -----
evaluation:
  pope_categories: ["random", "popular", "adversarial"]
  ablation_configs:
    - "baseline"
    - "detection_only"
    - "detection_cot"
    - "detection_cot_selfverify"
    - "full_no_grpo"
    - "full_grpo"
